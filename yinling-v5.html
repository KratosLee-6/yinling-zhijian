<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>银龄指尖v5 - 中老年手机教程</title>
<style>
:root{
  --p:#FF6B35;--p2:#E55A2B;--p3:#FFF0EA;
  --bg:#FFF8F5;--card:#fff;--t:#2D1B14;--t2:#5C3D2E;
  --b:#F0D5C8;--shadow:0 4px 20px rgba(120,60,30,.1);
  --nav:72px;--w:430px;--r:18px;--r2:12px;
  --h:#fff;--red:#E74C3C;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif;
  font-size:22px;line-height:1.6;color:var(--t);
  background:#F5EDE8;
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
  display:flex;justify-content:center;
  min-height:100vh;
  padding-bottom:env(safe-area-inset-bottom,0);
}
body.font-small{font-size:18px}
body.font-medium{font-size:22px}
body.font-large{font-size:26px}
.page{display:none;width:100%;max-width:var(--w);padding:16px;padding-bottom:calc(var(--nav) + 24px);min-height:100vh}
.page.active{display:block}

/* 启动封面 */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(135deg,#FF6B6B 0%,#FF8E53 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .8s;cursor:pointer;
}
#splash .content{text-align:center}
#splash .logo{font-size:80px;margin-bottom:20px;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#splash h1{color:#fff;font-size:36px;font-weight:bold;margin-bottom:10px;text-shadow:0 2px 8px rgba(0,0,0,.2)}
#splash p{color:rgba(255,255,255,.88);font-size:17px;margin-top:6px}
#splash .tip{position:absolute;bottom:50px;color:rgba(255,255,255,.6);font-size:14px}
#splash.fade{opacity:0;pointer-events:none}

/* 顶栏 */
.header{
  position:sticky;top:0;z-index:100;
  background:var(--h);padding:12px 0;margin:-16px -16px 16px;
  border-bottom:2px solid var(--b);
}
.header-row{display:flex;align-items:center;justify-content:space-between;padding:0 4px}
.header h1{font-size:26px;color:var(--p);font-weight:bold}
.hdr-btns{display:flex;gap:6px;align-items:center}
.size-btn{
  background:#FFF0EA;color:var(--p);border:1.5px solid var(--p);
  border-radius:8px;padding:5px 10px;font-size:15px;cursor:pointer;
  font-weight:bold;line-height:1;
}
.size-btn:active{background:var(--p);color:#fff}
.fav-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:4px;line-height:1}
.back-btn{background:none;border:none;font-size:19px;color:var(--p);cursor:pointer;padding:6px 12px;font-weight:bold}

/* 搜索框 */
.search-bar{margin:12px 0}
.search-bar input{
  width:100%;padding:15px 18px;border-radius:20px;
  border:2px solid var(--b);font-size:18px;outline:none;
  background:var(--card);color:var(--t);
}
.search-bar input:focus{border-color:var(--p)}
.search-bar input::placeholder{color:#BBA}

/* 应用网格 */
.app-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:4px}
.app-card{
  background:var(--card);border-radius:var(--r);padding:22px 16px;
  text-align:center;cursor:pointer;box-shadow:var(--shadow);
  transition:transform .15s;min-height:120px;display:flex;
  flex-direction:column;align-items:center;justify-content:center;gap:8px;
}
.app-card:active{transform:scale(0.96)}
.app-card .emoji{font-size:50px;line-height:1}
.app-card .name{font-size:19px;font-weight:bold;color:var(--t)}
.app-card .desc{font-size:13px;color:var(--t2);margin-top:2px;line-height:1.4}

/* 步骤 */
.step-item{padding:20px 0;border-bottom:1px solid var(--b)}
.step-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px}
.step-num{
  width:46px;height:46px;flex-shrink:0;
  background:var(--p);color:#fff;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:23px;font-weight:bold;
}
.step-info{flex:1;min-width:0}
.step-title{font-size:22px;font-weight:bold;color:var(--t);margin-bottom:6px;line-height:1.3}
.step-text{font-size:20px;color:var(--t2);line-height:1.5;margin-bottom:10px}
.step-hint{
  background:#FFF3EE;padding:12px 16px;border-radius:var(--r2);
  font-size:17px;color:var(--t2);line-height:1.5;
  border-left:4px solid var(--p);
}
.step-img{
  width:100%;margin-top:14px;border-radius:var(--r2);
  overflow:hidden;background:#F0EBE7;
  display:flex;align-items:center;justify-content:center;
  min-height:160px;max-height:260px;
}
.step-img img{width:100%;height:auto;display:block;max-height:260px;object-fit:contain}

/* 底部分页 */
.nav-bottom{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:var(--w);
  background:var(--h);padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0));
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 -4px 16px rgba(0,0,0,.08);z-index:200;
}
.nav-btn{
  padding:13px 22px;background:var(--p);color:#fff;
  border:none;border-radius:var(--r2);font-size:17px;
  cursor:pointer;font-weight:bold;min-width:100px;text-align:center;
}
.nav-btn:disabled{background:#ccc;cursor:not-allowed}
.nav-indicator{font-size:16px;color:var(--t2);flex:1;text-align:center}

/* 收藏列表 */
.list-item{
  background:var(--card);border-radius:var(--r);padding:16px 18px;
  margin:10px 0;display:flex;align-items:center;gap:14px;
  cursor:pointer;box-shadow:var(--shadow);transition:transform .15s;
}
.list-item:active{transform:scale(0.98)}
.list-item .emoji{font-size:40px;flex-shrink:0}
.list-item .info{flex:1}
.list-item .app-name{font-size:19px;font-weight:bold;color:var(--t)}
.list-item .app-desc{font-size:14px;color:var(--t2);margin-top:2px}
.list-item .del-btn{
  background:none;border:none;font-size:18px;cursor:pointer;
  color:#ccc;padding:8px;transition:color .2s;
}
.list-item .del-btn:hover{color:var(--red)}

/* 搜索结果 */
.result-item{
  background:var(--card);border-radius:var(--r);padding:14px 16px;
  margin:8px 0;cursor:pointer;box-shadow:var(--shadow);
  transition:transform .15s;
}
.result-item:active{transform:scale(0.98)}
.result-item .app-name{font-size:19px;font-weight:bold;color:var(--t)}
.result-item .match-info{font-size:14px;color:var(--t2);margin-top:4px}

/* 空状态 */
.empty-state{text-align:center;padding:60px 20px}
.empty-state .icon{font-size:64px;margin-bottom:16px;opacity:.5}
.empty-state .tip{font-size:18px;color:var(--t2)}
.empty-state .tip2{font-size:15px;color:#BBA;margin-top:10px}

/* 设置品牌页 */
.brand-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:8px}
.brand-card{
  background:var(--card);border-radius:var(--r);padding:20px 12px;
  text-align:center;cursor:pointer;box-shadow:var(--shadow);
  transition:transform .15s;
}
.brand-card:active{transform:scale(0.96)}
.brand-card .icon{font-size:44px;display:block;margin-bottom:8px}
.brand-card .name{font-size:16px;font-weight:bold;color:var(--t)}

/* 滚动条 */
::-webkit-scrollbar{width:0}
</style>
</head>
<body>

<!-- 启动封面 -->
<div id="splash">
  <div class="content">
    <div class="logo">❤️</div>
    <h1>银龄指尖</h1>
    <p>让爸妈跟上时代</p>
  </div>
  <div class="tip">点击任意处进入</div>
</div>

<!-- 首页 -->
<div id="home" class="page active">
  <div class="header">
    <div class="header-row">
      <h1>银龄指尖</h1>
      <div class="hdr-btns">
        <button class="size-btn" onclick="setFont('small')">小</button>
        <button class="size-btn" onclick="setFont('medium')">中</button>
        <button class="size-btn" onclick="setFont('large')">大</button>
        <button class="fav-btn" onclick="showPage('favorites')">❤️</button>
      </div>
    </div>
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="搜索想学的功能，如：微信聊天" oninput="onSearchInput(this)" onfocus="enterSearch()">
  </div>
  <div class="app-grid" id="appGrid"></div>
</div>

<!-- 教程详情 -->
<div id="detail" class="page">
  <div class="header">
    <div class="header-row">
      <button class="back-btn" onclick="showPage('home')">← 返回</button>
      <span id="detailTitle" style="font-size:21px;flex:1;text-align:center;font-weight:bold;color:var(--t)">应用名称</span>
      <button id="detailFavBtn" class="fav-btn" onclick="toggleFav()">♡</button>
    </div>
  </div>
  <div id="stepList"></div>
  <div class="nav-bottom">
    <button class="nav-btn" id="prevBtn" onclick="prevStep()">← 上一题</button>
    <span class="nav-indicator" id="stepIndicator">1/5</span>
    <button class="nav-btn" id="nextBtn" onclick="nextStep()">下一题 →</button>
  </div>
</div>

<!-- 收藏页 -->
<div id="favorites" class="page">
  <div class="header">
    <div class="header-row">
      <button class="back-btn" onclick="showPage('home')">← 返回</button>
      <span style="font-size:21px;flex:1;text-align:center;font-weight:bold;color:var(--t)">我的收藏</span>
      <div style="width:60px"></div>
    </div>
  </div>
  <div id="favList"></div>
</div>

<!-- 搜索页 -->
<div id="search" class="page">
  <div class="header">
    <div class="header-row">
      <button class="back-btn" onclick="exitSearch()">← 返回</button>
      <input type="text" id="searchPageInput" placeholder="搜索教程" oninput="doSearch(this.value)" style="flex:1;border:none;font-size:19px;outline:none;background:transparent;color:var(--t)">
    </div>
  </div>
  <div id="searchResults"></div>
</div>

<!-- 品牌选择页（手机设置子页面） -->
<div id="brands" class="page">
  <div class="header">
    <div class="header-row">
      <button class="back-btn" onclick="showPage('home')">← 返回</button>
      <span style="font-size:21px;flex:1;text-align:center;font-weight:bold;color:var(--t)">选择手机品牌</span>
      <div style="width:60px"></div>
    </div>
  </div>
  <div class="app-grid" id="brandGrid"></div>
</div>

  {id:"xiaomi",name:"小米",emoji:"📱"},
  {id:"oppo",name:"OPPO",emoji:"📱"},
  {id:"vivo",name:"vivo",emoji:"📱"},
  {id:"apple",name:"苹果",emoji:"🍎"},
  {id:"samsung",name:"三星",emoji:"📱"}
];

var curId=null,curStep=0,curFavs=[],curFont="medium",curKw="";

// ==== 初始化 ====
(function init(){
  curFont=localStorage.getItem("ylz_font")||"medium";
  curFavs=JSON.parse(localStorage.getItem("ylz_favs")||"[]");
  document.body.className="font-"+curFont;
  renderHome();
  renderFavorites();
  if(localStorage.getItem("ylz_splash")){
    document.getElementById("splash").style.display="none";
  }
})();

function skipSplash(){
  localStorage.setItem("ylz_splash","1");
  var sp=document.getElementById("splash");
  sp.classList.add("fade");
  setTimeout(function(){sp.style.display="none"},800);
}

function setFont(s){
  curFont=s;
  document.body.className="font-"+s;
  localStorage.setItem("ylz_font",s);
}

function showPage(id){
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active")});
  document.getElementById(id).classList.add("active");
  if(id==="search"){
    setTimeout(function(){
      var inp=document.getElementById("searchPageInput");
      inp.value=curKw;
      inp.focus();
    },50);
  }
  if(id==="detail"){
    showDetail(curId);
  }
}

function onSearchInput(v){
  curKw=v;
  if(v.length>0) showPage("search");
  else showPage("home");
  doSearch(v);
}

function enterSearch(){
  curKw=document.getElementById("searchInput").value;
  doSearch(curKw);
}

function exitSearch(){
  document.getElementById("searchInput").value="";
  curKw="";
  showPage("home");
}

function renderHome(){
  var g=document.getElementById("appGrid");
  g.innerHTML="";
  tutorials.forEach(function(t){
    var c=document.createElement("div");
    c.className="app-card";
    c.onclick=function(){
      curId=t.id;
      showPage("detail");
    };
    c.innerHTML='<span class="emoji">'+t.emoji+'</span><span class="name">'+t.name+'</span><span class="desc">'+t.desc+'</span>';
    g.appendChild(c);
  });
}

function showDetail(id){
  if(!id) return;
  var t=tutorials.find(function(x){return x.id===id;});
  if(!t) return;
  document.getElementById("detailTitle").textContent=t.name+" "+t.emoji;
  curStep=0;
  updateFavBtn();
  renderStep();
}

function renderStep(){
  var t=tutorials.find(function(x){return x.id===curId;});
  if(!t) return;
  var steps=t.steps;
  var s=steps[curStep];
  var total=steps.length;
  document.getElementById("stepIndicator").textContent=(curStep+1)+"/"+total;
  document.getElementById("prevBtn").disabled=(curStep===0);
  document.getElementById("nextBtn").disabled=(curStep===total-1);
  var el=document.getElementById("stepList");
  var svg=svgPlaceholder(s.title);
  var imgUrl="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svg);
  el.innerHTML=
    '<div class="step-item">'+
      '<div class="step-top">'+
        '<div class="step-num">'+s.n+'</div>'+
        '<div class="step-info">'+
          '<div class="step-title">'+s.title+'</div>'+
          '<div class="step-text">'+s.text+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="step-hint">💡 '+s.hint+'</div>'+
      '<div class="step-img"><img src="'+imgUrl+'" alt="配图"></div>'+
    '</div>';
}

function svgPlaceholder(text){
  var ch=text.charAt(0)||"?";
  var colors=["#FF6B6B","#4ECDC4","#45B7D1","#96CEB4","#F7DC6F","#BB8FCE","#F8B500","#26C6DA","#EC7063","#58D68D"];
  var color=colors[Math.abs(ch.charCodeAt(0)||0)%colors.length];
  return '<svg xmlns="http://www.w3.org/2000/svg" width="240" height="320" viewBox="0 0 240 320">'+
    '<rect width="240" height="320" fill="#F5EDE8"/>'+
    '<rect x="40" y="30" width="160" height="260" rx="16" fill="'+color+'" opacity="0.15"/>'+
    '<rect x="40" y="30" width="160" height="260" rx="16" fill="none" stroke="'+color+'" stroke-width="3" stroke-dasharray="8,4"/>'+
    '<text x="120" y="165" text-anchor="middle" fill="'+color+'" font-size="72" font-weight="bold" font-family="sans-serif">'+ch+'</text>'+
    '<text x="120" y="210" text-anchor="middle" fill="'+color+'" font-size="18" font-family="sans-serif">步骤配图位置</text>'+
  '</svg>';
}

function prevStep(){
  var t=tutorials.find(function(x){return x.id===curId;});
  if(!t) return;
  if(curStep>0){curStep--;renderStep();scrollTo(0,0);}
}
function nextStep(){
  var t=tutorials.find(function(x){return x.id===curId;});
  if(!t) return;
  if(curStep<t.steps.length-1){curStep++;renderStep();scrollTo(0,0);}
}

function updateFavBtn(){
  var isFav=curFavs.indexOf(curId)>=0;
  document.getElementById("detailFavBtn").textContent=isFav?"❤️":"♡";
}

function toggleFav(){
  var idx=curFavs.indexOf(curId);
  if(idx>=0) curFavs.splice(idx,1);
  else curFavs.push(curId);
  localStorage.setItem("ylz_favs",JSON.stringify(curFavs));
  updateFavBtn();
  renderFavorites();
}

function renderFavorites(){
  var el=document.getElementById("favList");
  if(curFavs.length===0){
    el.innerHTML='<div class="empty-state"><div class="icon">❤️</div><div class="tip">还没有收藏</div><div class="tip2">点击教程页的心形按钮添加收藏</div></div>';
    return;
  }
  el.innerHTML="";
  curFavs.forEach(function(id){
    var t=tutorials.find(function(x){return x.id===id;});
    if(!t) return;
    var item=document.createElement("div");
    item.className="list-item";
    item.onclick=function(){
      curId=t.id;
      showPage("detail");
    };
    item.innerHTML=
      '<span class="emoji">'+t.emoji+'</span>'+
      '<div class="info"><div class="app-name">'+t.name+'</div><div class="app-desc">'+t.desc+'</div></div>'+
      '<button class="del-btn" onclick="event.stopPropagation();delFav(\''+id+'\')">✕</button>';
    el.appendChild(item);
  });
}

function delFav(id){
  curFavs=curFavs.filter(function(x){return x!==id;});
  localStorage.setItem("ylz_favs",JSON.stringify(curFavs));
  updateFavBtn();
  renderFavorites();
}

function doSearch(kw){
  curKw=kw;
  var el=document.getElementById("searchResults");
  if(!kw||kw.trim().length===0){
    el.innerHTML='<div class="empty-state"><div class="icon">🔍</div><div class="tip">输入关键词搜索教程</div></div>';
    return;
  }
  var k=kw.trim().toLowerCase();
  var results=[];
  tutorials.forEach(function(t){
    var matched=[];
    t.steps.forEach(function(s){
      if(s.title.indexOf(k)>=0||s.text.indexOf(k)>=0||t.name.indexOf(k)>=0){
        matched.push(s);
      }
    });
    if(matched.length>0){
      results.push({t:t,steps:matched});
    }
  });
  if(results.length===0){
    el.innerHTML='<div class="empty-state"><div class="icon">🔍</div><div class="tip">没有找到相关教程</div><div class="tip2">试试其他关键词，如：微信、支付、导航</div></div>';
    return;
  }
  var html='<div style="font-size:15px;color:var(--t2);margin:8px 0 12px">找到 '+results.length+' 个相关教程</div>';
  results.forEach(function(r){
    html+='<div class="result-item" onclick="curId=\''+r.t.id+'\';showPage(\'detail\')">'+
      '<div class="app-name">'+r.t.emoji+' '+r.t.name+'<span style="font-size:14px;font-weight:normal;color:var(--t2)"> — 含'+r.steps.length+'个相关步骤</span></div>';
    r.steps.slice(0,2).forEach(function(s){
      html+='<div class="match-info" style="margin-top:4px">▪ '+s.title+': '+s.text+'</div>';
    });
    if(r.steps.length>2) html+='<div class="match-info" style="color:#BBA">+ 还有'+(r.steps.length-2)+'个相关步骤</div>';
    html+='</div>';
  });
  el.innerHTML=html;
}

// 品牌选择（手机设置点击后）
document.getElementById("appGrid").addEventListener("click",function(e){
  var card=e.target.closest(".app-card");
  if(!card) return;
  var idx=Array.from(document.querySelectorAll(".app-card")).indexOf(card);
  var t=tutorials[idx];
  if(!t) return;
  curId=t.id;
  if(curId==="settings"){
    showPage("brands");
    renderBrands();
  } else {
    showPage("detail");
  }
},true);

function renderBrands(){
  var g=document.getElementById("brandGrid");
  g.innerHTML="";
  brands.forEach(function(b){
    var c=document.createElement("div");
    c.className="brand-card";
    c.onclick=function(){
      alert(b.name+"设置教程开发中，敬请期待！");
    };
    c.innerHTML='<span class="icon">'+b.emoji+'</span><span class="name">'+b.name+'</span>';
    g.appendChild(c);
  });
}

// 封面点击
document.getElementById("splash").addEventListener("click",skipSplash);
</script>
</body>
</html>
